name: MacPastie
options:
  bundleIdPrefix: com.akang
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

schemes:
  MacPastie:
    build:
      targets:
        MacPastie: all
        MacPastieTests: [test]
    test:
      targets:
        - MacPastieTests

targets:
  MacPastie:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "Tests/**"
          - "*.xcodeproj/**"
          - "*.entitlements"
          - "build/**"
          - "DerivedData/**"
          - "miniprogram_qrcode.jpg"
    resources:
      - path: Assets.xcassets
      - path: qrcode.jpg
      - path: video_qrcode.jpg
      - path: social_qrcodes.png
    info:
      path: Info.plist
      properties:
        LSUIElement: false
        LSMultipleInstancesProhibited: true
        LSApplicationCategoryType: public.app-category.productivity
        NSPrincipalClass: NSApplication
        NSAppleEventsUsageDescription: "阿康的 Mac 贴贴需要辅助功能权限来移动和调整其他应用的窗口大小。"
        CFBundleDisplayName: 阿康的 Mac 贴贴
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    entitlements:
      path: MacPastie.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.automation.apple-events: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akang.macpastie
        PRODUCT_MODULE_NAME: MacPastie
        PRODUCT_NAME: 阿康的 Mac 贴贴
        MARKETING_VERSION: 1.0.2
        CURRENT_PROJECT_VERSION: 2
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        # XCTest needs the app executable itself as its host. Xcode's debug
        # dylib launcher does not export the Swift module symbols to it.
        ENABLE_DEBUG_DYLIB: NO
        # 禁用沙盒（Accessibility 控制窗口必须）
        ENABLE_APP_SANDBOX: NO
    dependencies:
      - sdk: Carbon.framework
      - sdk: ApplicationServices.framework
      - sdk: ServiceManagement.framework

  MacPastieTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        # The test bundle imports the app module, so it must load the app
        # executable as its host.  A hostless bundle compiles but leaves all
        # app symbols unresolved at link time.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/阿康的 Mac 贴贴.app/Contents/MacOS/阿康的 Mac 贴贴"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: MacPastie

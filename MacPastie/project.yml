name: MacPastie
options:
  bundleIdPrefix: com.akang
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

targets:
  MacPastie:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "*.xcodeproj/**"
          - "*.entitlements"
          - "DerivedData/**"
          - "miniprogram_qrcode.jpg"
    resources:
      - path: qrcode.jpg
    info:
      path: Info.plist
      properties:
        LSUIElement: true
        LSMultipleInstancesProhibited: true
        LSApplicationCategoryType: public.app-category.productivity
        NSPrincipalClass: NSApplication
        NSAppleEventsUsageDescription: "阿康的 Mac 贴贴需要辅助功能权限来移动和调整其他应用的窗口大小。"
        CFBundleDisplayName: 阿康的 Mac 贴贴
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    entitlements:
      path: MacPastie.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.automation.apple-events: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akang.macpastie
        PRODUCT_NAME: 阿康的 Mac 贴贴
        MARKETING_VERSION: 1.0.1
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        # 禁用沙盒（Accessibility 控制窗口必须）
        ENABLE_APP_SANDBOX: NO
    dependencies:
      - sdk: Carbon.framework
      - sdk: ApplicationServices.framework
      - sdk: ServiceManagement.framework
